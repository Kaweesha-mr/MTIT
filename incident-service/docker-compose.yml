services:
  incident-db:
    image: postgres:16-alpine
    container_name: incident-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: incidents_db
      POSTGRES_USER: incident_user
      POSTGRES_PASSWORD: incident_pass
    ports:
      - "5436:5432"
    volumes:
      - incident_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incident_user -d incidents_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - incident-network

volumes:
  incident_db_data:

networks:
  incident-network:
    driver: bridge
