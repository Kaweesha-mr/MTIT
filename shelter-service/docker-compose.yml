services:
  shelter-db:
    image: postgres:16-alpine
    container_name: shelter-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shelters_db
      POSTGRES_USER: shelter_user
      POSTGRES_PASSWORD: shelter_pass
    ports:
      - "5435:5432"
    volumes:
      - shelter_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelter_user -d shelters_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - shelter-network

volumes:
  shelter_db_data:

networks:
  shelter-network:
    driver: bridge
