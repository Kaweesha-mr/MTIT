run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gocritic
    - misspell
    - unconvert
    - gofmt
    - goimports
  disable-all: false

linters-settings:
  govet:
    check-shadowing: true
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/kaweeshamarasinghe

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
