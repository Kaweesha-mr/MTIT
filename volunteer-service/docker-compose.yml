services:
  volunteer-db:
    image: postgres:16-alpine
    container_name: volunteer-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: volunteers_db
      POSTGRES_USER: volunteer_user
      POSTGRES_PASSWORD: volunteer_pass
    ports:
      - "5434:5432"
    volumes:
      - volunteer_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volunteer_user -d volunteers_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - volunteer-network

volumes:
  volunteer_db_data:

networks:
  volunteer-network:
    driver: bridge
