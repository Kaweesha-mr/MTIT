openapi: 3.0.3
info:
  title: Resource Service API
  version: 1.0.0
  description: Resource management and dispatch service for Disaster Relief Coordination System.
servers:
  - url: http://localhost:8083
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /resources:
    post:
      summary: Create a resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResourceRequest'
      responses:
        '201':
          description: Resource created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResourceResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /resources/{id}:
    get:
      summary: Get resource by integer ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Resource details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetResourceResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /resources/{id}/dispatch:
    put:
      summary: Dispatch resources to a shelter
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchRequest'
      responses:
        '200':
          description: Dispatch success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Business rule conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Downstream shelter service failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CreateResourceRequest:
      type: object
      required: [item, quantity, unit]
      properties:
        item:
          type: string
          example: WATER_BOTTLES
        quantity:
          type: integer
          example: 500
        unit:
          type: string
          example: PACKS

    CreateResourceResponse:
      type: object
      properties:
        id:
          type: integer
          example: 701
        item:
          type: string
          example: WATER_BOTTLES
        available:
          type: integer
          example: 500

    GetResourceResponse:
      type: object
      properties:
        id:
          type: integer
          example: 701
        item:
          type: string
          example: WATER_BOTTLES
        weight:
          type: string
          example: 500kg

    DispatchRequest:
      type: object
      required: [shelterId, quantity]
      properties:
        shelterId:
          type: integer
          example: 301
        quantity:
          type: integer
          example: 100

    DispatchResponse:
      type: object
      properties:
        resourceId:
          type: integer
          example: 701
        status:
          type: string
          example: DISPATCHED
        message:
          type: string
          example: Resources dispatched successfully to shelter 301

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: invalid request body
